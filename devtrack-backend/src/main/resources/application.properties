spring.application.name=devtrack-backend

# ─── Banco de dados — MySQL via XAMPP ────────────────────────────────────────
# 1. Abra o XAMPP Control Panel e clique "Start" em MySQL
# 2. Abra o phpMyAdmin (http://localhost/phpmyadmin)
# 3. Crie um banco chamado "devtrack" (botão "New" na barra lateral)
# Pronto! O Spring Boot cria as tabelas automaticamente.
spring.datasource.url=jdbc:mysql://localhost:3306/devtrack?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# update: cria/atualiza tabelas automaticamente na primeira execucao
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=ZGV2dHJhY2tTdXBlclNlY3JldEtleVBhcmFKV1RBdXRoZW50aWNhdGlvbjIwMjQ=

# ─── Servidor ─────────────────────────────────────────────────────────────────
server.port=8080

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
